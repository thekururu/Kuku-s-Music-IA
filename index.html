<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuku's Music IA | 404 Studios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;600&display=swap');
        
        body { font-family: 'Inter', sans-serif; background: #050505; color: #eee; }
        .font-logo { font-family: 'Syncopate', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .spotify-shadow { box-shadow: 0 0 30px rgba(30, 215, 96, 0.1); }
        
        /* Animación de carga */
        .loading-bar { height: 2px; width: 0%; background: #1DB954; transition: width 0.5s; }
        
        #chat-box::-webkit-scrollbar { width: 3px; }
        #chat-box::-webkit-scrollbar-thumb { background: #1DB954; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">

    <div class="loading-bar fixed top-0 left-0" id="loader"></div>

    <header class="w-full max-w-3xl flex justify-between items-center mb-8">
        <div class="font-logo text-xl tracking-tighter">
            KUKU<span class="text-[#1DB954] font-bold">.IA</span>
        </div>
        <div class="text-[10px] uppercase tracking-[0.3em] text-zinc-500 font-bold">
            404 Developer Studios / External Access
        </div>
    </header>

    <section id="status-card" class="w-full max-w-3xl glass rounded-3xl p-6 mb-6 spotify-shadow transition-all border-l-2 border-[#1DB954]">
        <div class="flex items-center gap-6">
            <div class="relative group">
                <img id="track-cover" src="https://via.placeholder.com/300?text=Spotify" class="w-24 h-24 rounded-2xl object-cover shadow-2xl transition-transform group-hover:scale-105">
                <div class="absolute -inset-1 bg-[#1DB954] rounded-2xl opacity-20 blur-sm"></div>
            </div>
            <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1">
                    <span class="flex h-2 w-2 rounded-full bg-[#1DB954] animate-pulse"></span>
                    <span class="text-[10px] uppercase tracking-widest text-[#1DB954] font-black">Live Monitor</span>
                </div>
                <h2 id="track-name" class="text-2xl font-bold truncate">Buscando señal...</h2>
                <p id="track-artist" class="text-zinc-400 font-medium">Configura tu perfil público</p>
            </div>
        </div>
    </section>

    <main class="w-full max-w-3xl h-[450px] glass rounded-3xl flex flex-col overflow-hidden relative">
        <div id="chat-box" class="flex-1 p-6 overflow-y-auto space-y-4 flex flex-col text-sm md:text-base">
            <div class="bg-zinc-800/40 self-start p-4 rounded-2xl rounded-tl-none border border-white/5">
                [SISTEMA]: En línea. Pega tu API KEY de Gemini en el código para activar la conciencia de la IA.
            </div>
        </div>

        <div class="p-4 bg-black/40 border-t border-white/5 flex gap-3">
            <input id="user-input" type="text" placeholder="Escribe un comando o pregunta sobre la música..." 
                   class="flex-1 bg-zinc-900 border-none rounded-2xl px-5 py-4 focus:ring-1 focus:ring-[#1DB954] outline-none text-sm transition-all shadow-inner">
            <button id="send-btn" class="bg-[#1DB954] text-black px-8 py-2 rounded-2xl font-black uppercase text-xs hover:bg-[#1ed760] transition-all transform active:scale-95">
                Enviar
            </button>
        </div>
    </main>

    <footer class="mt-8 text-zinc-600 text-[10px] uppercase tracking-widest">
        Unauthorized access restricted to thekururu // 2026
    </footer>

    <script>
        // CONFIGURACIÓN (EL "SHHH")
        const GEMINI_API_KEY = "AIzaSyBnxRc1R_lFROOuRkEfl7Dc0fpYIxnK6y4"; // Consíguela en Google AI Studio
        const SPOTIFY_USERNAME = "31xl4oqm6caspmft22ef4h5nydya"; // Tu nombre de usuario público
        
        let lastTrackData = { name: "Nada", artist: "Nadie" };

        // --- HACK: MONITOR DE ACTIVIDAD (OPCIÓN 2 / SCRAPING) ---
        // Usamos un proxy para leer la data pública de tu perfil
        async function updateActivity() {
            document.getElementById('loader').style.width = "40%";
            try {
                // Buscamos el perfil vía proxy de AllOrigins para saltar el CORS
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://open.spotify.com/user/' + SPOTIFY_USERNAME)}`);
                const data = await res.json();
                
                // NOTA: Spotify protege su HTML. Si no detecta actividad, es porque
                // necesitas tener el perfil en "Público". 
                // Como respaldo, este bloque busca patrones de texto en el código:
                const html = data.contents;
                
                // Intento de extracción simple (pattern matching)
                if (html.includes("nowPlaying")) {
                    console.log("¡Actividad detectada!");
                    // Aquí iría el parseo profundo si Spotify suelta el JSON
                }

                document.getElementById('loader').style.width = "100%";
                setTimeout(() => document.getElementById('loader').style.width = "0%", 1000);
            } catch (e) {
                console.error("Fallo en el monitor:", e);
            }
        }

        // --- CONEXIÓN CON GEMINI (EL CEREBRO) ---
        async function callAI(message) {
            if (GEMINI_API_KEY === "TU_GEMINI_API_KEY") {
                return "Oye, fiera. Primero pon la API KEY de Gemini en el código para que pueda hablar de verdad. JAJAJA.";
            }

            const prompt = `Actúa como una IA con mucho flow, sarcástica y experta en música urbana.
            Contexto: El usuario ${SPOTIFY_USERNAME} está escuchando actualmente "${lastTrackData.name}" de "${lastTrackData.artist}".
            Mensaje del usuario: ${message}
            Responde con actitud, sé breve y usa jerga de productor o fanático del trap/reggaeton.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const result = await response.json();
                return result.candidates[0].content.parts[0].text;
            } catch (err) {
                return "Mrd, se me cayó el servidor del cerebro. Intenta de nuevo.";
            }
        }

        // --- INTERFAZ ---
        async function handleSend() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            if (!input.value.trim()) return;

            const text = input.value;
            appendMsg(text, 'user');
            input.value = "";

            const response = await callAI(text);
            appendMsg(response, 'ai');
        }

        function appendMsg(text, type) {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = type === 'user' 
                ? 'bg-[#1DB954] text-black self-end p-4 rounded-2xl rounded-tr-none font-bold max-w-[85%] shadow-lg transition-all'
                : 'bg-zinc-800/60 self-start p-4 rounded-2xl rounded-tl-none border border-white/5 max-w-[85%] italic text-zinc-300 transition-all';
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById('send-btn').addEventListener('click', handleSend);
        document.getElementById('user-input').addEventListener('keypress', (e) => { if(e.key==='Enter') handleSend(); });

        // Actualizar monitor cada 60s (para no quemar el proxy)
        setInterval(updateActivity, 60000);
        updateActivity();

    </script>
</body>
</html>
